<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tape</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1 class="logo">Tape</h1>
    </header>

    <main>
      <div class="section home-create">
        <input type="text" id="pageNameInput" class="page-name-input" placeholder="שם הדף החדש...">
        <button id="createPageBtn" class="btn-primary">דף חדש +</button>
        <div id="createError" class="error-msg hidden"></div>
      </div>

      <div id="pages-section" class="section hidden">
        <h2 class="section-title">הדפים שלי</h2>
        <div id="pagesList" class="pages-list"></div>
      </div>
    </main>
  </div>

  <script src="home.js"></script>
</body>
</html>
