<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tape</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <header>
      <a href="/" class="back-link">כל הדפים ←</a>
      <h1 class="logo">Tape</h1>
      <h2 class="page-subtitle" id="pageTitle"></h2>
    </header>

    <main>
      <div id="recorder-section" class="section">
        <button id="recordBtn" class="record-btn" title="התחל הקלטה">
          <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
          <svg class="stop-icon hidden" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>

        <div id="timer" class="timer hidden">00:00</div>
        <p id="hint" class="hint">לחץ להקלטה</p>

        <label id="uploadLabel" class="btn-secondary upload-label">
          העלה קובץ אודיו / וידאו
          <input type="file" id="fileInput" accept="audio/*,video/*,.mp3,.m4a,.wav,.aac,.ogg,.mp4,.mov,.avi,.webm">
        </label>

        <label class="auto-check-label">
          <input type="checkbox" id="autoTranscribeCheck" checked>
          תמלל אוטומטית לאחר הקלטה / העלאה
        </label>

        <div id="statusMsg" class="status-msg hidden">
          <div class="spinner"></div>
          <span id="statusText"></span>
        </div>
      </div>

      <div id="player-section" class="section hidden">
        <audio id="audioPlayer" controls></audio>
        <button id="transcribeBtn" class="btn-primary hidden">תמלל</button>
      </div>

      <div id="result-section" class="section hidden">
        <div class="result-block">
          <div class="result-header">
            <h2>תמלול</h2>
            <div class="result-actions">
              <button id="copyRawBtn" class="btn-secondary">העתק</button>
              <button id="newBtn" class="btn-secondary">הקלטה חדשה</button>
            </div>
          </div>
          <textarea id="rawTextarea" class="result-text"></textarea>
        </div>

        <details id="promptDetails" class="raw-details">
          <summary>פרומפט לתיקון</summary>
          <textarea id="promptTextarea" class="prompt-text"></textarea>
        </details>

        <div class="correct-row">
          <button id="correctBtn" class="btn-primary">תקן טקסט</button>
          <div id="correctStatus" class="status-msg hidden">
            <div class="spinner"></div>
            <span>מתקן טקסט...</span>
          </div>
        </div>

        <div id="corrected-block" class="result-block hidden">
          <div class="result-header">
            <h2>טקסט מתוקן</h2>
            <button id="copyBtn" class="btn-secondary">העתק</button>
          </div>
          <textarea id="correctedText" class="result-text"></textarea>
        </div>
      </div>

      <div id="recordings-section" class="section hidden">
        <h2 class="section-title">הקלטות בדף</h2>
        <div id="recordingsList" class="recordings-list"></div>
      </div>
    </main>
  </div>

  <script src="/page.js"></script>
</body>
</html>
